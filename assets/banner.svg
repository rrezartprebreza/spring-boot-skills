<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="spring-boot-skills — production-grade Claude Code skills for Spring Boot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#10241a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="60%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#6DB33F"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6DB33F"/>
      <stop offset="100%" stop-color="#3f7d22"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6DB33F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6DB33F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#94a3b8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1200" height="300" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#grid)"/>
    <circle cx="1050" cy="40" r="260" fill="url(#glowGreen)"/>
    <circle cx="160" cy="280" r="240" fill="url(#glowBlue)"/>

    <!-- left: title block -->
    <g font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace">
      <text x="64" y="96" font-size="15" letter-spacing="6" fill="#6DB33F" font-weight="600">CLAUDE CODE × SPRING BOOT</text>
      <text x="62" y="152" font-size="52" font-weight="800" fill="url(#title)" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">spring-boot-skills</text>
      <text x="64" y="192" font-size="17" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">18 production-grade skills that teach your AI agent</text>
      <text x="64" y="218" font-size="17" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">to code Spring Boot like a senior engineer.</text>

      <!-- chips -->
      <g font-size="12.5" font-weight="600">
        <rect x="64" y="240" width="92" height="26" rx="13" fill="#6DB33F" fill-opacity="0.12" stroke="#6DB33F" stroke-opacity="0.45"/>
        <text x="110" y="257" text-anchor="middle" fill="#a7f3d0">Java 21+</text>
        <rect x="166" y="240" width="132" height="26" rx="13" fill="#6DB33F" fill-opacity="0.12" stroke="#6DB33F" stroke-opacity="0.45"/>
        <text x="232" y="257" text-anchor="middle" fill="#a7f3d0">Spring Boot 3.x</text>
        <rect x="308" y="240" width="118" height="26" rx="13" fill="#38bdf8" fill-opacity="0.10" stroke="#38bdf8" stroke-opacity="0.40"/>
        <text x="367" y="257" text-anchor="middle" fill="#bae6fd">Spring AI 1.0</text>
        <rect x="436" y="240" width="124" height="26" rx="13" fill="#e879f9" fill-opacity="0.08" stroke="#e879f9" stroke-opacity="0.35"/>
        <text x="498" y="257" text-anchor="middle" fill="#f5d0fe">MCP Java SDK</text>
      </g>
    </g>

    <!-- right: terminal card -->
    <g transform="translate(700 52)">
      <rect x="0" y="0" width="436" height="196" rx="12" fill="#0b1322" stroke="#1e293b" stroke-width="1.5"/>
      <rect x="0" y="0" width="436" height="34" rx="12" fill="#111a2e"/>
      <rect x="0" y="22" width="436" height="12" fill="#111a2e"/>
      <circle cx="22" cy="17" r="5.5" fill="#f87171"/>
      <circle cx="42" cy="17" r="5.5" fill="#fbbf24"/>
      <circle cx="62" cy="17" r="5.5" fill="#34d399"/>
      <text x="218" y="21" text-anchor="middle" font-size="12" fill="#64748b" font-family="ui-monospace, Menlo, Consolas, monospace">~/my-spring-app</text>

      <g font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="13.5">
        <text x="22" y="62"><tspan fill="#6DB33F">❯</tspan><tspan fill="#e2e8f0" dx="8">claude</tspan></text>
        <text x="22" y="88"><tspan fill="#64748b">›</tspan><tspan fill="#cbd5e1" dx="8">add a paginated orders endpoint</tspan></text>
        <text x="22" y="118"><tspan fill="#a7f3d0">✓</tspan><tspan fill="#6DB33F" dx="8">Skill</tspan><tspan fill="#94a3b8" dx="6">rest-api-conventions</tspan></text>
        <text x="22" y="142"><tspan fill="#a7f3d0">✓</tspan><tspan fill="#6DB33F" dx="8">Skill</tspan><tspan fill="#94a3b8" dx="6">spring-data-jpa</tspan></text>
        <text x="22" y="172"><tspan fill="#38bdf8">⏺</tspan><tspan fill="#e2e8f0" dx="8">Following your envelope + keyset</tspan></text>
        <text x="40" y="190"><tspan fill="#e2e8f0">pagination conventions…</tspan></text>
      </g>
    </g>

    <!-- spring leaf mark -->
    <g transform="translate(615 118) scale(1.15)">
      <path d="M30 2 C14 12 4 26 6 44 C8 56 18 60 26 56 C38 50 46 34 48 14 C40 26 30 36 18 42 C28 32 36 20 42 4 C38 2 34 0 30 2 Z" fill="url(#leaf)" opacity="0.9"/>
    </g>
  </g>
</svg>
